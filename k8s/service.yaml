apiVersion: v1
kind: Service
metadata:
  name: bhkw-simulator-service
spec:
  type: NodePort
  selector:
    app: bhkw-simulator
  ports:
    - name: modbus
      port: 5020
      targetPort: 5020
      nodePort: 30020
    - name: rest-api
      port: 8080
      targetPort: 8080
      nodePort: 30080